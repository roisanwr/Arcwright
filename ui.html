<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcwright - Storytelling AI</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        .markdown-body p { margin-bottom: 0.75em; }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5em; margin-bottom: 0.75em; }
        .markdown-body strong { font-weight: bold; color: #fff; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans h-screen flex overflow-hidden">
    <div id="root" class="w-full h-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [sessionId, setSessionId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [inputValue, setInputValue] = useState("");
            const [status, setStatus] = useState("Initializing...");
            const [isLoading, setIsLoading] = useState(true);
            const [script, setScript] = useState(null);
            
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => { scrollToBottom(); }, [messages, status]);

            // Start Session
            useEffect(() => {
                fetch("/api/start")
                    .then(res => res.json())
                    .then(data => {
                        setSessionId(data.session_id);
                        connectSSE(data.session_id);
                    })
                    .catch(err => {
                        console.error(err);
                        setStatus("Error connecting to server.");
                    });
            }, []);

            const connectSSE = (sid) => {
                const eventSource = new EventSource(`/api/stream?session_id=${sid}`);
                
                eventSource.addEventListener("chat", (e) => {
                    const data = JSON.parse(e.data);
                    setMessages(prev => [...prev, data]);
                    setIsLoading(false);
                });

                eventSource.addEventListener("status", (e) => {
                    const data = JSON.parse(e.data);
                    setStatus(data.message);
                    if (data.node !== "idle") setIsLoading(true);
                    else setIsLoading(false);
                });

                eventSource.addEventListener("script", (e) => {
                    const data = JSON.parse(e.data);
                    setScript(data);
                });

                eventSource.addEventListener("error", (e) => {
                    const data = JSON.parse(e.data);
                    setStatus("Error: " + data.message);
                    setIsLoading(false);
                });

                eventSource.onerror = () => {
                    setStatus("Connection lost. Reconnecting...");
                };
            };

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!inputValue.trim() || isLoading) return;

                const msg = inputValue.trim();
                setInputValue("");
                setMessages(prev => [...prev, { role: "user", content: msg }]);
                setIsLoading(true);

                try {
                    await fetch("/api/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ session_id: sessionId, message: msg })
                    });
                } catch (error) {
                    console.error("Error sending message:", error);
                    setStatus("Failed to send message");
                    setIsLoading(false);
                }
            };

            return (
                <div class="flex flex-1 h-full">
                    {/* Main Chat Area */}
                    <div class="flex-1 flex flex-col h-full border-r border-gray-800">
                        {/* Header */}
                        <div class="bg-gray-800 p-4 shadow flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded bg-gradient-to-r from-blue-500 to-purple-600 flex items-center justify-center font-bold text-white">
                                    A
                                </div>
                                <h1 class="text-xl font-bold">Arcwright</h1>
                            </div>
                            <div class="text-xs text-gray-400 bg-gray-900 px-3 py-1 rounded-full border border-gray-700">
                                {status}
                            </div>
                        </div>

                        {/* Chat Messages */}
                        <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-950">
                            {messages.length === 0 && (
                                <div class="h-full flex items-center justify-center text-gray-500 text-sm">
                                    Pipeline is warming up... (Ollama model loading)
                                </div>
                            )}
                            
                            {messages.map((msg, i) => (
                                <div key={i} class={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div class={`max-w-[80%] rounded-xl p-4 ${
                                        msg.role === 'user' 
                                            ? 'bg-blue-600 text-white rounded-br-none' 
                                            : 'bg-gray-800 text-gray-200 border border-gray-700 rounded-bl-none'
                                    }`}>
                                        <div 
                                            class="markdown-body text-sm leading-relaxed" 
                                            dangerouslySetInnerHTML={{ __html: marked.parse(msg.content) }}
                                        />
                                    </div>
                                </div>
                            ))}
                            <div ref={messagesEndRef} />
                        </div>

                        {/* Input Area */}
                        <div class="p-4 bg-gray-900 border-t border-gray-800">
                            <form onSubmit={sendMessage} class="flex gap-2 relative">
                                <input
                                    type="text"
                                    value={inputValue}
                                    onChange={(e) => setInputValue(e.target.value)}
                                    placeholder="Type your answer here..."
                                    disabled={isLoading}
                                    class="flex-1 bg-gray-950 border border-gray-700 text-white rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50"
                                />
                                <button 
                                    type="submit" 
                                    disabled={isLoading || !inputValue.trim()}
                                    class="bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:hover:bg-blue-600 text-white px-6 py-3 rounded-lg font-medium transition-colors"
                                >
                                    {isLoading ? 'Wait...' : 'Send'}
                                </button>
                            </form>
                        </div>
                    </div>

                    {/* Sidebar / Script Output */}
                    <div class="w-1/3 bg-gray-900 flex flex-col h-full hidden lg:flex">
                        <div class="p-4 border-b border-gray-800 bg-gray-800">
                            <h2 class="font-bold text-gray-200">Output Script</h2>
                        </div>
                        <div class="flex-1 p-4 overflow-y-auto">
                            {script ? (
                                <div class="bg-gray-950 border border-gray-800 rounded-lg p-5">
                                    <h3 class="text-xl font-bold text-white mb-2">{script.title || "Your Story"}</h3>
                                    <div class="flex gap-2 mb-4">
                                        <span class="text-xs bg-purple-900/50 text-purple-300 px-2 py-1 rounded border border-purple-800">
                                            {script.platform_variant}
                                        </span>
                                    </div>
                                    <div 
                                        class="markdown-body text-sm text-gray-300 space-y-4"
                                        dangerouslySetInnerHTML={{ __html: marked.parse(script.body || "") }}
                                    />
                                </div>
                            ) : (
                                <div class="h-full flex flex-col items-center justify-center text-gray-600 text-sm text-center px-8">
                                    <svg class="w-12 h-12 mb-4 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                    </svg>
                                    <p>Script will appear here once the pipeline finishes outlining and drafting.</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
